<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="https://irancell.ir/wp-content/uploads/2022/03/Irancell-Logo180-2-150x150.png"
      sizes="32x32"
    />
    <link rel="stylesheet" href="content/css/index.css" />
    <title>My Irancell</title>
  </head>
  <body>
    <div class="left-side lalezar-font">
      <!-- Profile Box -->
      <div class="profile-box flex align-items-center">
        <div class="profile-wrapper flex">
          <img
            src="content/img/profile.jpg"
            alt="profile"
            class="user-profile"
          />
        </div>
        <div class="profile-box-desc flex flex-column">
          <h1 class="user-name">سلام، محمد امین قنواتی</h1>
          <h5 class="user-number">+989123456789</h5>
        </div>
      </div>

      <!-- Sim Card charge -->
      <div class="sim-card-charge-box">
        <h1 class="sim-card-charge-title">شارژ باقی‌مانده سیم‌کارت</h1>
        <div class="flex flex-column align-items-center">
          <div class="charge-progress progress-10">
            <div class="overlay">۶۰۰۰ تومان</div>
          </div>
          <button class="charge-btn lalezar-font">سیم‌کارتت رو شارژ کن!</button>
        </div>
      </div>
    </div>

    <script src="content/js/index.js"></script>
  </body>
</html>
